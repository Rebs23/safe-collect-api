<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Docs | Safe-Collect API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Space Grotesk', sans-serif; background: #000; color: #94a3b8; }
        code { font-family: 'Fira Code', monospace; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .code-block { background: #020617; border: 1px solid #1e293b; border-radius: 1rem; padding: 1.5rem; overflow-x: auto; }
        .text-gradient { background: linear-gradient(to r, #60a5fa, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <!-- Sidebar -->
    <aside class="w-full md:w-64 glass p-8 border-r border-white/10 shrink-0">
        <div class="text-xl font-bold text-gradient mb-12">SAFE-COLLECT</div>
        <nav class="space-y-4 text-sm uppercase tracking-widest font-bold">
            <a href="#intro" class="block text-white">Introduction</a>
            <a href="#auth" class="block hover:text-blue-400">Authentication</a>
            <a href="#endpoints" class="block hover:text-blue-400">Endpoints</a>
            <hr class="border-white/10 my-8">
            <a href="index.html" class="block text-gray-500 hover:text-white">← Main Terminal</a>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 md:p-24 overflow-y-auto">
        <div class="max-w-3xl mx-auto">
            
            <section id="intro" class="mb-20">
                <h1 class="text-5xl font-bold text-white mb-6 tracking-tighter">API Reference</h1>
                <p class="text-xl leading-relaxed mb-8">
                    Our API is globally accessible at: <br>
                    <span class="text-blue-400 font-mono">https://safe-collect-api-1.onrender.com</span>
                </p>
            </section>

            <section id="auth" class="mb-20">
                <h2 class="text-3xl font-bold text-white mb-6">Live Integration</h2>
                <div class="code-block text-blue-300">
                    curl -X POST https://safe-collect-api-1.onrender.com/v1/charge \<br>
                    &nbsp;&nbsp;-H "Authorization: Bearer YOUR_SDF_KEY"
                </div>
            </section>

        </div>
    </main>

</body>
</html>
